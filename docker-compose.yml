services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/coachpo/prism-backend:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-/app/data/gateway.db}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - prism_data:/app/data
    

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/coachpo/prism-frontend:latest}
    restart: unless-stopped
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    

volumes:
  prism_data:
